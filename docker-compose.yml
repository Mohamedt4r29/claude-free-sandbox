networks:
  internal:
    driver: bridge
    internal: true
  internet:
    driver: bridge

services:
  proxy:
    build: ./docker/proxy_api_translator
    container_name: litellm_proxy
    networks:
      - internal
      - internet
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; socket.create_connection(('localhost', 4000), 2).close()"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  claude:
    build: ./docker/claude_code
    container_name: claude_code
    depends_on:
      proxy:
        condition: service_healthy
    networks:
      - internal
    environment:
      - ANTHROPIC_BASE_URL=http://proxy:4000
      - ANTHROPIC_AUTH_TOKEN=dummy-key
      - ANTHROPIC_MODEL=claude-code-model
      - DISABLE_TELEMETRY=1
    volumes:
      - ${PROJECT_PATH:-.}:/home/developer/workspace
      
    stdin_open: true
    tty: true